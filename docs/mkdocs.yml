
# Set up navigation: https://squidfunk.github.io/mkdocs-material/setup/setting-up-navigation/
site_name: Andrey Shtrauss
site_url: https://shtrausslearning.github.io/
repo_name: 'shtrausslearning.github.io'
repo_url: https://github.com/shtrausslearning/shtrausslearning.github.io
edit_uri: tree/master/docs/src/markdown
site_description: A Collection of Useful Snippets on Machine Learning related topics
docs_dir: markdown

##################################################################

markdown_extensions:
    - meta
    - markdown.extensions.toc:
        slugify: !!python/name:pymdownx.slugs.uslugify
        permalink: ""
    - markdown.extensions.admonition:
    - markdown.extensions.smarty:
        smart_quotes: false
    - pymdownx.betterem:
    - markdown.extensions.attr_list:
    - markdown.extensions.def_list:
    - markdown.extensions.tables:
    - markdown.extensions.abbr:
    - markdown.extensions.footnotes:
    - markdown.extensions.md_in_html:
    - pymdownx.highlight:
        extend_pygments_lang:
          - name: php-inline
            lang: php
            options:
              startinline: true
          - name: pycon3
            lang: pycon
            options:
              python3: true
        linenums_style: pymdownx-inline
    - pymdownx.inlinehilite:
        custom_inline:
          - name: math
            class: arithmatex
            format: !!python/name:pymdownx.arithmatex.inline_mathjax_format
    - pymdownx.magiclink:
        repo_url_shortener: true
        repo_url_shorthand: true
        social_url_shorthand: true
        social_url_shortener: true
        user: facelessuser
        repo: pymdown-extensions
    - pymdownx.tilde:
    - pymdownx.caret:
    - pymdownx.smartsymbols:
    - pymdownx.emoji:
        emoji_index: !!python/name:materialx.emoji.twemoji
        emoji_generator: !!python/name:materialx.emoji.to_svg
    - pymdownx.escapeall:
        hardbreak: True
        nbsp: True
    - pymdownx.tasklist:
        custom_checkbox: true
    - pymdownx.progressbar:
    - pymdownx.arithmatex:
        generic: true
    - pymdownx.mark:
    # - pymdownx.striphtml:
    - pymdownx.snippets:
        base_path: markdown/_snippets
    - pymdownx.keys:
        separator: "\uff0b"
    - pymdownx.details:
    - pymdownx.tabbed:
        alternate_style: true

##################################################################

theme:
    name: material
    icon:
        logo: fontawesome/solid/code 
        repo: fontawesome/brands/github
    language: en
    features:
        - navigation.instant
        - navigation.instant.progress
        - navigation.sections
        - navigation.expand
        - navigation.tracking
        - navigation.tabs
        - navigation.tabs.sticky 
        - navigation.top
        - content.tabs.link

    custom_dir: material/overrides
    palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/toggle-switch
        name: Switch to dark mode
    - scheme: slate
      primary: black
      accent: indigo
      toggle:
        icon: material/toggle-switch-off-outline
        name: Switch to light mode

    font:
        text: Ubuntu

extra:
    disqus: shtrausslearning.github.io
    manifest: manifest.webmanifest
    social:
    - icon: fontawesome/brands/github
      link: https://github.com/shtrausslearning
      name: shtrausslearning
    - icon: fontawesome/brands/kaggle
      link: https://www.kaggle/shtraussleaning
      name: shtrausslearning
    - icon: fontawesome/brands/telegram
      link: https://t.me/mldsai_info
      name: mldsai-info

plugins:
    - blog:
        blog_toc: true
        post_excerpt: optional
        post_excerpt_separator: <!-- more -->
        archive_name: Archive
        post_slugify: !!python/object/apply:pymdownx.slugs.slugify
            kwds:
                case: lower
    - search
    - tags
    - offline

extra_javascript:
  - javascripts/mathjax.js
  - https://polyfill.io/v3/polyfill.min.js?features=es6
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

extra_css:
  - stylesheets/custom.css

copyright: |
  Copyright &copy; 2023 <a href="https://github.com/shtrausslearning"  target="_blank" rel="noopener">Andrey Shtrauss</a>

nav:
- Home: index.md

- Data Science: 

    - NLP: portfolio/nlp.md
    - Business: portfolio/business.md
    - Financial: portfolio/financial.md
    - Physics: portfolio/physics.md
    - Biology: portfolio/biology.md
    - Health: portfolio/health.md
    - Geospatial: portfolio/geospatial.md

- Bioinformatics: bio-portfolio.md

- mllibs:

    - About: mllibs/about.md
    - Installation: mllibs/install.md
    - Projects:
        - ML Project Phases: mllibs/projects/mlproject.md
        - ML Projects List: 
            - Gene Family Classification: mllibs/projects/gene_classification.md

    - Modules: 
        - Available modules: mllibs/modules/list.md
        - Adding new modules: mllibs/modules/adding.md
        - Grouping modules: mllibs/modules/grouping.md

    - Documentation: 
        - iterative: mllibs/documentation/iterative.md
        - storage: mllibs/documentation/data_storage.md
        - nlpm: mllibs/documentation/nlpm.md
        - nlpi: mllibs/documentation/nlpi.md
        - eda:
            - eda_simple: mllibs/documentation/eda/meda_simple.md
            - eda_splot: mllibs/documentation/eda/meda_splot.md 
            - eda_scplot: mllibs/documentation/eda/meda_scplot.md

    - Group:
        - Tasks:
          - Recommendation: mllibs/group/tasks/recom.md
          - Label Classification: mllibs/group/tasks/label_classifier.md
        - Task Status: mllibs/group/status.md
        - Meetings: mllibs/group/meetups.md
        - Members: mllibs/group/members.md

- Blog:
    - blog/index.md

- About: about.md
