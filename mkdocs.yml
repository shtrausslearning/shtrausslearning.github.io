repo_url: https://github.com/shtrausslearning/shtrausslearning.github.io
repo_name: shtrausslearning.github.io
site_author: Andrey Shtrauss
site_description: Personal Website
site_name: mldsai
site_url: https://shtrausslearning.github.io
docs_dir: docs

theme:
  language: en
  name: material
  logo: images/logo2.svg
  favicon: images/mllibs2.svg
  font:
      text: Ubuntu
      code: Roboto Mono
  icon:
    logo: mllibs2.svg
    repo: fontawesome/brands/square-github

  logo: images/logo2.svg
  favicon: images/mllibs2.svg
    
  features:
    - content.code.annotate
    - content.code.copy
    - content.code.select
    - content.tabs.link
    - content.tooltips
    - navigation.indexes
    - navigation.path
    - navigation.tabs
    - navigation.top
    - search.highlight
    - search.suggest
    - navigation.sections

  custom_dir: "docs/overrides"
  palette: 

    # Palette toggle for light mode
    - scheme: default
      toggle:
        icon: material/toggle-switch
        name: Switch to dark mode

    # Palette toggle for dark mode
    - scheme: slate
      toggle:
        icon: material/toggle-switch-off-outline
        name: Switch to light mode
        
markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - pymdownx.caret
  - pymdownx.critic
  - pymdownx.details
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.snippets
  - pymdownx.tilde
  - tables
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - toc:
      permalink: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
      options:
        custom_icons:
          - overrides/.icons

plugins:
  - blog:
      archive_date_format: MMMM, yyyy
      archive_url_date_format: yyyy/MM
      pagination_per_page: 10
      pagination_format: $link_first $link_previous ~2~ $link_next $link_last
      post_excerpt_separator: <!-- more -->
  - search: null
  - markdownextradata:
      data: docs/data/render_yaml/
  - tags
  - offline
  - mkdocs-jupyter:
      include_source: True
      ignore_h1_titles: True
      include_requirejs: true
      custom_mathjax_url: "https://cdnjs.cloudflare.com/ajax/libs/mathjax/2.7.7/latest.js?config=TeX-AMS_CHTML-full,Safe"
      

extra:
    manifest: manifest.webmanifest
    analytics:
      provider: google
      property: G-R7CLKWM3LT
      feedback:
        title: Was this page helpful?
        ratings:
          - icon: material/arrow-up-thick
            name: This page was helpful!
            data: 1
            note: Thanks for your feedback!
          - icon: material/arrow-down-thick
            name: This page could be improved!
            data: 0
            note: Thanks for your feedback!
    social:
    - icon: fontawesome/brands/github
      link: https://github.com/shtrausslearning
      name: shtrausslearning
    - icon: fontawesome/brands/kaggle
      link: https://www.kaggle/shtraussleaning
      name: shtrausslearning
    - icon: fontawesome/brands/telegram
      link: https://t.me/mldsai_info
      name: mldsai-info

copyright: |
  Copyright &copy; 2023-2024 <a href="https://github.com/shtrausslearning"  target="_blank" rel="noopener">Andrey Shtrauss</a>

extra_css:
  - stylesheets/customize.css
  - stylesheets/extra.css
  - stylesheets/simpleicons.css
  - https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.7/katex.min.css

extra_javascript:
  - javascripts/katex.js
  - https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.7/katex.min.js
  - https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.7/contrib/auto-render.min.js

nav:
  - <b>Home</b>:
      - index.md

  - <b>Projects</b>: 
      - portfolio/index.md
      - NLP: portfolio/nlp.md
      - Business: portfolio/business.md
      - Finance: portfolio/financial.md
      - Physics: portfolio/physics.md
      - Biology: portfolio/biology.md
      - Health: portfolio/health.md
      - Geospatial: portfolio/geospatial.md

  - <b>Articles</b>:
      - blog/index.md
      
  - <b>Notebooks</b>:
      - notebooks/index.md
      - RecSys: notebooks/recsys/index.md
      - Machine Learning: notebooks/sfml/index.md
  
  - <b>mllibs</b>: 
        - mllibs: proj_mllibs/index.md
        - documentation: 
            - mstats_tests: proj_mllibs/documentation/mstats_tests.md
        
  - <b>About</b>: about/index.md